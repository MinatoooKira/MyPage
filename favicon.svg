<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#6254e8"/>
  <!-- Simplified DNA helix (two curved lines) -->
  <g stroke="white" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 30 25 Q 50 35 70 25"/>
    <path d="M 30 75 Q 50 65 70 75"/>
  </g>
  <!-- Connecting rungs -->
  <line x1="35" y1="28" x2="35" y2="72" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="35" x2="50" y2="65" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="65" y1="28" x2="65" y2="72" stroke="white" stroke-width="2" opacity="0.6"/>
</svg>
